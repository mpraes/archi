name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            cc: gcc
          - goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: npm ci && npm run build

      - name: Install build toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc gcc-aarch64-linux-gnu

      - name: Build binary
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BIN="archi"
          mkdir -p dist
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "dist/${BIN}" ./cmd/archi
          tar -czf "dist/archi-${VERSION}-${GOOS}-${GOARCH}.tar.gz" -C dist "${BIN}"
          sha256sum "dist/archi-${VERSION}-${GOOS}-${GOARCH}.tar.gz" > "dist/archi-${VERSION}-${GOOS}-${GOARCH}.tar.gz.sha256"
          rm -f "dist/${BIN}"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256