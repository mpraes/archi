name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version override (e.g. v0.1.0). Must match a CHANGELOG.md section.'
        required: false
        type: string

env:
  GO_VERSION: '1.26.3'
  NODE_VERSION: '24'
  MIN_COVERAGE: '75'

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Fast path: lint, unit tests, frontend, build, E2E smoke
  # ---------------------------------------------------------------------------
  ci-fast:
    name: Fast — Lint / Test / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --config .github/golangci.yml --timeout=5m

      - name: gofmt check
        run: |
          out=$(gofmt -l ./cmd ./internal ./web)
          if [ -n "$out" ]; then
            echo "::error::gofmt would reformat:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test (unit + integration)
        run: go test -count=1 ./...

      - name: Frontend install
        working-directory: web
        run: npm ci

      - name: Frontend typecheck
        working-directory: web
        run: npm run typecheck

      - name: Frontend unit tests
        working-directory: web
        run: npm test

      - name: Build frontend (embedded into binary via go:embed)
        working-directory: web
        run: npm run build

      - name: Build binary
        run: go build -o archi ./cmd/archi

      - name: E2E smoke (export json)
        run: ./archi export testdata/mini-go --format json --lang go | jq -e '.moduleCount >= 1'

      - name: E2E smoke (check gate)
        run: ./archi check testdata/mini-go --max-distance 1.0 --lang go

  # ---------------------------------------------------------------------------
  # Quality path: coverage gate, race, artifacts
  # ---------------------------------------------------------------------------
  ci-quality:
    name: Quality — Coverage / Race
    runs-on: ubuntu-latest
    needs: ci-fast
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: npm ci && npm run build

      - name: Coverage gate (internal >= ${{ env.MIN_COVERAGE }}%)
        run: |
          chmod +x scripts/check-coverage.sh
          MIN_COVERAGE=${{ env.MIN_COVERAGE }} ./scripts/check-coverage.sh

      - name: Race detector
        run: go test -race -count=1 ./...

      - name: npm audit (web)
        working-directory: web
        run: npm audit --audit-level=high || true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # BUILD MATRIX: cross-compile per (os, arch) on ubuntu, package each archive
  # + sha256. Downstream jobs reuse these artifacts.
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    needs: [ci-fast, ci-quality]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.version != '')
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            goos: linux
            goarch: amd64
            cgo: '1'
            cc: gcc
            ext: ''
            archive: tar.gz
          - os: windows
            arch: amd64
            goos: windows
            goarch: amd64
            cgo: '1'
            cc: x86_64-w64-mingw32-gcc
            ext: .exe
            archive: zip
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: npm ci && npm run build

      - name: Install build toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc gcc-mingw-w64-x86-64 zip

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          v="${{ inputs.version }}"
          if [ -z "$v" ]; then v="${GITHUB_REF##refs/tags/}"; fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "num=${v#v}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        shell: bash
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
          LDFLAGS: -s -w -X main.version=${{ steps.ver.outputs.version }}
        run: |
          mkdir -p staging
          go build -ldflags "$LDFLAGS" -trimpath -o "staging/archi${{ matrix.ext }}" ./cmd/archi

      - name: Pack archive
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          OS: ${{ matrix.os }}
          ARCH: ${{ matrix.arch }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          name="archi-${VERSION}-${OS}-${ARCH}"
          mkdir -p "out/${name}"
          cp -r staging/* "out/${name}/"
          [ -f LICENSE ] && cp LICENSE "out/${name}/" || true
          cd out
          if [ "$ARCHIVE" = "zip" ]; then
            zip -r "${name}.${ARCHIVE}" "${name}"
          else
            tar -czf "${name}.${ARCHIVE}" "${name}"
          fi
          sha256sum "${name}.${ARCHIVE}" > "${name}.${ARCHIVE}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.os }}-${{ matrix.arch }}
          path: out/archi-*.*.*
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # RELEASE: download every artifact, slice the CHANGELOG, create the GitHub
  # Release with notes + checksums, then fan out to nfpm / Homebrew tap / AUR.
  # ---------------------------------------------------------------------------
  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          v="${{ inputs.version }}"
          if [ -z "$v" ]; then v="${GITHUB_REF##refs/tags/}"; fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "num=${v#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version has a CHANGELOG section
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          header=$(grep -E "^## \[${VERSION#v}\]" CHANGELOG.md || true)
          if [ -z "$header" ]; then
            echo "::error::No '## [${VERSION#v}]' section in CHANGELOG.md"
            exit 1
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: artifact-*
          merge-multiple: true

      - name: Assemble checksums file
        working-directory: dist
        run: cat archi-*.sha256 | sort -u > checksums.txt

      - name: Slice CHANGELOG section for this version
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          awk -v ver="${VERSION#v}" '
            BEGIN { hdr = "## [" ver "]" }
            index($0, hdr) == 1 { flag=1; next }
            flag && index($0, "## [") == 1 { exit }
            flag { print }
          ' CHANGELOG.md > changelog_section.md

      - name: Compose release body
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          {
            cat changelog_section.md
            echo
            echo "## Install"
            echo
            echo '### Direct download'
            echo
            echo '**Linux**'
            echo '```sh'
            echo 'curl -fsSL https://github.com/mpraes/archi/releases/download/'"$VERSION"'/archi-'"$VERSION"'-linux-amd64.tar.gz | tar xz'
            echo '```'
            echo
            echo '**Windows**'
            echo 'Download `archi-'"$VERSION"'-windows-amd64.zip`, extract `archi.exe`, then run from PowerShell or CMD:'
            echo '```powershell'
            echo '.\archi.exe . --no-browser'
            echo '```'
            echo
            echo '### DEB / RPM'
            echo 'Grab `archi_'"${VERSION#v}"'_amd64.deb` or `archi_'"${VERSION#v}"'_amd64.rpm` from the assets below.'
            echo
            echo '## SHA256'
            echo
            echo '```'
            cat dist/checksums.txt
            echo '```'
          } > release_body.md

      - name: Create GitHub Release
        id: ghrel
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          body_path: release_body.md
          files: |
            dist/archi-*.tar.gz
            dist/archi-*.zip
            dist/checksums.txt
          fail_on_unmatched_files: true

      - name: Install nfpm
        run: |
          curl -fsSL https://github.com/goreleaser/nfpm/releases/download/v2.41.0/nfpm_2.41.0_Linux_x86_64.tar.gz \
            | tar xz -C /usr/local/bin nfpm

      - name: Extract linux/amd64 binary for nfpm
        working-directory: dist
        run: |
          mkdir -p nfpm-stage
          tar -xzf archi-${{ steps.ver.outputs.version }}-linux-amd64.tar.gz -C nfpm-stage
          cp nfpm-stage/archi-*/archi ./archi

      - name: Build DEB and RPM
        env:
          VERSION: ${{ steps.ver.outputs.num }}
        run: |
          nfpm pkg --config nfpm.yaml --packager deb --target dist/archi_${VERSION}_amd64.deb
          nfpm pkg --config nfpm.yaml --packager rpm --target dist/archi_${VERSION}_amd64.rpm

      - name: Upload DEB/RPM to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          files: |
            dist/archi_*.deb
            dist/archi_*.rpm
