name: Nightly

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

env:
  GO_VERSION: "1.26.3"
  NODE_VERSION: "24"

permissions:
  contents: read

jobs:
  mutation:
    name: Mutation tests (gremlins)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@latest
      - name: Run mutation tests
        run: |
          gremlins unleash --config .github/gremlins.yml ./internal/analyzer ./internal/parser --timeout 15m || true
      - name: Upload gremlins report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gremlins-report
          path: gremlins.log
          if-no-files-found: ignore

  race-and-bench:
    name: Race detector and benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build frontend
        working-directory: web
        run: npm ci && npm run build
      - name: Race tests
        run: go test -race -count=1 ./...
      - name: Benchmark smoke
        run: go test -bench=. -benchtime=50ms ./internal/analyzer ./internal/parser
