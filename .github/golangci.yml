version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gocyclo
    - gosec
    - misspell
    - unconvert
    - bodyclose
  settings:
    gocyclo:
      min-complexity: 15
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
      - path: internal/cli/help\.go
        linters:
          - misspell
      - path: internal/(analyzer|parser|ai)/
        linters:
          - gocyclo
          - gosec
      - path: internal/ui/ui\.go
        linters:
          - gosec
